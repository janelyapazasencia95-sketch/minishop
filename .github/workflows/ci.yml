name: MiniShop CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build y Pruebas
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Checkout del código fuente
        uses: actions/checkout@v4

      - name: 2 - Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3 - Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: 4 - Compilar el proyecto
        run: ./mvnw compile --no-transfer-progress

      - name: 5 - Ejecutar pruebas unitarias
        run: ./mvnw test --no-transfer-progress

      - name: 6 - Ejecutar pruebas de integración
        run: ./mvnw verify --no-transfer-progress

      - name: 7 - Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-pruebas
          path: target/surefire-reports/
          retention-days: 7