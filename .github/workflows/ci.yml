name: MiniShop CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Pruebas y Análisis de Calidad
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Checkout del código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2 - Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3 - Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: 4 - Compilar el proyecto
        run: ./mvnw compile --no-transfer-progress

      - name: 5 - Ejecutar pruebas unitarias
        run: ./mvnw test --no-transfer-progress

      - name: 6 - Ejecutar pruebas y generar cobertura
        run: ./mvnw verify --no-transfer-progress

      - name: 7 - Análisis de calidad con SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw sonar:sonar
          --no-transfer-progress
          -Dsonar.projectKey=janelyapazasencia95-sketch_minishop
          -Dsonar.organization=${{ secrets.SONAR_ORG }}

      - name: 8 - Publicar reporte de pruebas y cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-pruebas-y-cobertura
          path: |
            target/surefire-reports/
            target/site/jacoco/
          retention-days: 7